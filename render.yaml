services:
  # Backend Service
  - type: web
    name: complaint-manager-backend
    env: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        value: sqlite:///./db.sqlite3